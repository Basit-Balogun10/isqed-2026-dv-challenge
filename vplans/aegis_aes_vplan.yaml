dut: aegis_aes
vplan:
  - id: VP-AES-001
    title: "NIST ECB encrypt test vector"
    description: "Load FIPS 197 Appendix B test key (2b7e1516...) and plaintext (3243f6a8...), set mode=ECB, operation=encrypt, trigger start, and verify DATA_OUT matches the known ciphertext."
    priority: high
    coverage_target: "cp_mode.ecb cross cp_op.encrypt cross cp_kat"

  - id: VP-AES-002
    title: "NIST ECB decrypt test vector"
    description: "Load the FIPS 197 ciphertext as input with the same key, set mode=ECB, operation=decrypt, and verify DATA_OUT matches the original plaintext."
    priority: high
    coverage_target: "cp_mode.ecb cross cp_op.decrypt cross cp_kat"

  - id: VP-AES-003
    title: "NIST CBC encrypt test vector"
    description: "Load NIST SP 800-38A CBC encrypt test vector (key, IV, plaintext). Set mode=CBC, operation=encrypt, and verify ciphertext matches the known-answer value."
    priority: high
    coverage_target: "cp_mode.cbc cross cp_op.encrypt cross cp_kat"

  - id: VP-AES-004
    title: "NIST CBC decrypt test vector"
    description: "Load NIST SP 800-38A CBC ciphertext with the same key and IV. Set mode=CBC, operation=decrypt, and verify plaintext matches the known-answer value."
    priority: high
    coverage_target: "cp_mode.cbc cross cp_op.decrypt cross cp_kat"

  - id: VP-AES-005
    title: "Key expansion correctness"
    description: "Use multiple key values (all-zero, all-one, NIST key) and verify the output matches expected ciphertext, confirming all 11 round keys are correctly derived."
    priority: high
    coverage_target: "cp_key_pattern cross cp_mode.ecb"

  - id: VP-AES-006
    title: "Back-to-back ECB operations"
    description: "Trigger a first ECB encrypt, wait for output_valid, read result, immediately load new data and trigger again. Verify both outputs are correct with no corruption between operations."
    priority: high
    coverage_target: "cp_back_to_back cross cp_mode.ecb"

  - id: VP-AES-007
    title: "Back-to-back CBC operations"
    description: "Perform two consecutive CBC encrypt blocks. Verify the IV is automatically updated after the first block, and the second block's ciphertext is correct per CBC chaining."
    priority: high
    coverage_target: "cp_back_to_back cross cp_mode.cbc"

  - id: VP-AES-008
    title: "CBC IV handling"
    description: "Program a specific IV, perform a CBC encrypt, then read back the IV registers. Verify the IV has been updated to the ciphertext of the last block (as per CBC spec)."
    priority: high
    coverage_target: "cp_iv_update"

  - id: VP-AES-009
    title: "Register clear on config change"
    description: "Write key, IV, and data_in, then assert key_iv_data_in_clear in AES_TRIGGER. Verify all key, IV, and data_in registers read as zero. Also test data_out_clear separately."
    priority: medium
    coverage_target: "cp_clear"

  - id: VP-AES-010
    title: "Partial CSR writes"
    description: "Write only 3 of 4 key registers before triggering. Observe the behavior (unpredictable output). Then write all 4 and verify correct operation. Confirms the engine does not track partial writes."
    priority: low
    coverage_target: "cp_partial_write"

  - id: VP-AES-011
    title: "DATA_OUT read before valid"
    description: "Trigger an AES operation and immediately read DATA_OUT before output_valid is set. Verify the read returns stale/undefined data. Then wait for output_valid and confirm correct output."
    priority: medium
    coverage_target: "cp_status.output_valid"

  - id: VP-AES-012
    title: "Encrypt-then-decrypt roundtrip"
    description: "Encrypt a random plaintext block in ECB mode, then decrypt the resulting ciphertext. Verify the decrypted output matches the original plaintext exactly."
    priority: high
    coverage_target: "cp_roundtrip cross cp_mode.ecb"

  - id: VP-AES-013
    title: "CBC encrypt-then-decrypt roundtrip"
    description: "Encrypt a block in CBC mode, note the ciphertext and updated IV. Decrypt using the original IV and key, and verify plaintext recovery."
    priority: high
    coverage_target: "cp_roundtrip cross cp_mode.cbc"

  - id: VP-AES-014
    title: "Mode switching ECB to CBC"
    description: "Perform an ECB encrypt, then change AES_CTRL to CBC mode and perform another operation with an IV. Verify the mode switch takes effect correctly on the next operation."
    priority: medium
    coverage_target: "cp_mode_switch"

  - id: VP-AES-015
    title: "Trigger while busy"
    description: "Start an AES operation, then immediately write start=1 to AES_TRIGGER while the engine is not idle. Verify the second trigger is ignored and the first operation completes correctly."
    priority: medium
    coverage_target: "cp_trigger_busy"

  - id: VP-AES-016
    title: "Status register accuracy"
    description: "Check AES_STATUS at each phase: idle/input_ready=1 initially, idle=0 after trigger, output_valid=1 after completion. Verify all status transitions."
    priority: high
    coverage_target: "cp_status"

  - id: VP-AES-017
    title: "All-zero data pattern"
    description: "Encrypt and decrypt a 128-bit all-zero block with a known key. Verify ciphertext matches the expected known-answer for all-zero input."
    priority: medium
    coverage_target: "cp_data_pattern.all_zero"

  - id: VP-AES-018
    title: "All-one data pattern"
    description: "Encrypt and decrypt a 128-bit all-one (0xFF) block. Verify correct ciphertext output."
    priority: medium
    coverage_target: "cp_data_pattern.all_one"

  - id: VP-AES-019
    title: "Walking-1 data pattern"
    description: "Encrypt blocks with a single bit set at each of the 128 positions. Verify each produces a distinct and correct ciphertext, exercising all S-box entries."
    priority: medium
    coverage_target: "cp_data_pattern.walking_one"

  - id: VP-AES-020
    title: "Interrupt and INTR_TEST"
    description: "Enable the aes_done interrupt, trigger an operation, and verify intr_o asserts on completion. Clear via W1C. Also test INTR_TEST injection and verify the interrupt path independently."
    priority: medium
    coverage_target: "cp_intr_done cross cp_intr_test"
