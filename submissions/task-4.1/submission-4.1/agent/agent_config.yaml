llm:
    mode: "online"
    provider: "openai"
    primary_model: "gpt-5.4-mini"
    primary_reasoning_effort: "xhigh"
    escalation_model: "gpt-5.4"
    escalation_reasoning_effort: "xhigh"
    judge_min_score: 80
    max_total_calls: 60
    temperature: 0.1
    timeout_seconds: 90

agent:
    max_minutes: 60
    max_iterations: 4
    max_iterations_cap: 12
    iteration_mode: "auto"
    min_iterations: 4
    auto_extension_step: 2
    max_repair_generations_per_iteration: 1
    timeout_minutes: 60.0
    plateau_escalation_enabled: true
    plateau_delta_epsilon: 0.5
    plateau_far_from_goal_margin: 15.0
    simulator_mode: "auto"
    require_dual_simulator: false
    stage_time_limits_minutes:
        analyze: 10
        plan: 10
        build: 20
        test_measure_iterate: 20
