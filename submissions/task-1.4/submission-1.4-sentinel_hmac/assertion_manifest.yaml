assertions:
  - name: "p_tl_a_valid_stable"
    file: "protocol_assertions.sv"
    type: "protocol"
    description: "A-channel valid remains asserted until accepted."
    spec_ref: "TL-UL A-channel handshake semantics"
  - name: "p_tl_a_payload_stable"
    file: "protocol_assertions.sv"
    type: "protocol"
    description: "A-channel payload stays stable while waiting for ready."
    spec_ref: "TL-UL payload stability requirement"
  - name: "p_tl_d_valid_stable"
    file: "protocol_assertions.sv"
    type: "protocol"
    description: "D-channel valid remains asserted until consumed."
    spec_ref: "TL-UL D-channel handshake semantics"
  - name: "p_tl_d_payload_stable"
    file: "protocol_assertions.sv"
    type: "protocol"
    description: "D-channel payload remains stable while back-pressured."
    spec_ref: "TL-UL response stability requirement"
  - name: "p_tl_supported_request_opcode"
    file: "protocol_assertions.sv"
    type: "protocol"
    description: "Only PutFullData and Get requests are accepted."
    spec_ref: "sentinel_hmac TL command decoding"
  - name: "p_tl_req_decode_consistent"
    file: "protocol_assertions.sv"
    type: "protocol"
    description: "Accepted request decodes as read or write operation."
    spec_ref: "sentinel_hmac request decode logic"
  - name: "p_tl_response_opcode_matches_request"
    file: "protocol_assertions.sv"
    type: "protocol"
    description: "Write requests return AccessAck response opcode."
    spec_ref: "sentinel_hmac TL response generation"
  - name: "p_tl_response_opcode_matches_read"
    file: "protocol_assertions.sv"
    type: "protocol"
    description: "Read requests return AccessAckData response opcode."
    spec_ref: "sentinel_hmac TL response generation"

  - name: "p_interrupt_output_matches_state"
    file: "functional_assertions.sv"
    type: "functional"
    description: "Interrupt output equals masked interrupt state."
    spec_ref: "sentinel_hmac spec section 8 interrupt equation"
  - name: "p_hash_start_leaves_idle"
    file: "functional_assertions.sv"
    type: "functional"
    description: "hash_start transitions engine out of IDLE when SHA is enabled."
    spec_ref: "sentinel_hmac spec section 4.2 command behavior"
  - name: "p_hash_start_resets_message_length"
    file: "functional_assertions.sv"
    type: "functional"
    description: "hash_start resets message length counters."
    spec_ref: "sentinel_hmac spec sections 4.2 and 4.7/4.8"
  - name: "p_intr_enable_write_updates_register"
    file: "functional_assertions.sv"
    type: "functional"
    description: "Writes to INTR_ENABLE update interrupt mask register."
    spec_ref: "sentinel_hmac spec section 4.10"
  - name: "p_done_transition_sets_done_interrupt"
    file: "functional_assertions.sv"
    type: "functional"
    description: "Transition into DONE sets hmac_done interrupt state bit."
    spec_ref: "sentinel_hmac spec section 8 hmac_done"
  - name: "p_wipe_or_start_clears_done_interrupt"
    file: "functional_assertions.sv"
    type: "functional"
    description: "wipe/start operation clears stale done interrupt state."
    spec_ref: "sentinel_hmac command and wipe behavior"

  - name: "p_alert_stays_low"
    file: "structural_assertions.sv"
    type: "structural"
    description: "alert_o remains deasserted in normal reference operation."
    spec_ref: "sentinel_hmac spec section 10"
  - name: "p_state_encoding_in_range"
    file: "structural_assertions.sv"
    type: "structural"
    description: "FSM encoded state stays within legal range."
    spec_ref: "sentinel_hmac state machine encoding"
  - name: "p_fifo_count_bounds"
    file: "structural_assertions.sv"
    type: "structural"
    description: "Message FIFO count never exceeds configured depth."
    spec_ref: "sentinel_hmac spec FIFO depth"
  - name: "p_fifo_flags_exclusive"
    file: "structural_assertions.sv"
    type: "structural"
    description: "FIFO cannot report full and empty simultaneously."
    spec_ref: "sentinel_hmac FIFO invariant"
  - name: "p_fifo_empty_means_zero_count"
    file: "structural_assertions.sv"
    type: "structural"
    description: "fifo_empty flag corresponds to zero FIFO depth."
    spec_ref: "sentinel_hmac STATUS semantics"
  - name: "p_fifo_full_means_full_count"
    file: "structural_assertions.sv"
    type: "structural"
    description: "fifo_full flag corresponds to full FIFO depth."
    spec_ref: "sentinel_hmac STATUS semantics"
  - name: "p_tl_d_opcode_legal"
    file: "structural_assertions.sv"
    type: "structural"
    description: "Valid TL response uses legal D-channel opcodes."
    spec_ref: "TL-UL D-channel encoding"

  - name: "p_start_makes_progress"
    file: "liveness_assertions.sv"
    type: "liveness"
    description: "hash_start command causes forward progress out of IDLE."
    spec_ref: "sentinel_hmac command progression"
  - name: "p_round_state_completes"
    file: "liveness_assertions.sv"
    type: "liveness"
    description: "SHA_ROUND state exits within bounded time."
    spec_ref: "SHA-256 64-round bounded execution"
  - name: "p_stop_eventually_done"
    file: "liveness_assertions.sv"
    type: "liveness"
    description: "hash_stop eventually drives state machine to DONE."
    spec_ref: "sentinel_hmac finalization behavior"
  - name: "p_fifo_empty_interrupt_progress"
    file: "liveness_assertions.sv"
    type: "liveness"
    description: "FIFO-empty pulse eventually sets interrupt state bit 1."
    spec_ref: "sentinel_hmac interrupt source fifo_empty"
  - name: "p_tl_request_response_progress"
    file: "liveness_assertions.sv"
    type: "liveness"
    description: "Accepted TL requests produce immediate response progress."
    spec_ref: "sentinel_hmac TL response policy"
  - name: "p_restart_from_done"
    file: "liveness_assertions.sv"
    type: "liveness"
    description: "DONE state can restart upon hash_start command."
    spec_ref: "sentinel_hmac repeated-operation support"
