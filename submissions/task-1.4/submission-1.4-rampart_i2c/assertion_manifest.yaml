assertions:
  - name: "p_tl_a_valid_stable"
    file: "protocol_assertions.sv"
    type: "protocol"
    description: "A-channel valid remains asserted until handshake completes."
    spec_ref: "TL-UL protocol valid/ready handshake stability"
  - name: "p_tl_a_payload_stable"
    file: "protocol_assertions.sv"
    type: "protocol"
    description: "A-channel payload fields remain stable while waiting for ready."
    spec_ref: "TL-UL protocol payload stability requirement"
  - name: "p_tl_d_valid_stable"
    file: "protocol_assertions.sv"
    type: "protocol"
    description: "D-channel valid remains asserted until accepted."
    spec_ref: "TL-UL response channel valid/ready behavior"
  - name: "p_tl_d_payload_stable"
    file: "protocol_assertions.sv"
    type: "protocol"
    description: "D-channel payload is stable while waiting for ready."
    spec_ref: "TL-UL response payload stability requirement"
  - name: "p_tl_a_opcode_supported"
    file: "protocol_assertions.sv"
    type: "protocol"
    description: "Only supported request opcodes are accepted."
    spec_ref: "TL-UL A-channel opcode set"
  - name: "p_tl_d_opcode_supported"
    file: "protocol_assertions.sv"
    type: "protocol"
    description: "Only AccessAck/AccessAckData response opcodes are emitted."
    spec_ref: "TL-UL D-channel opcode set"
  - name: "p_tl_response_bounded"
    file: "protocol_assertions.sv"
    type: "protocol"
    description: "Every accepted request receives a bounded response."
    spec_ref: "TL-UL response progress guarantee"
  - name: "p_open_drain_constant_low"
    file: "protocol_assertions.sv"
    type: "protocol"
    description: "Open-drain data outputs are constant low values."
    spec_ref: "rampart_i2c spec section 3.1 open-drain bus model"

  - name: "p_interrupt_output_matches_state"
    file: "functional_assertions.sv"
    type: "functional"
    description: "Interrupt output vector equals masked interrupt state."
    spec_ref: "rampart_i2c spec section 4.13 interrupt output equation"
  - name: "p_host_disable_forces_idle"
    file: "functional_assertions.sv"
    type: "functional"
    description: "Host FSM returns to idle after host mode is disabled."
    spec_ref: "rampart_i2c host enable control behavior"
  - name: "p_target_disable_forces_idle"
    file: "functional_assertions.sv"
    type: "functional"
    description: "Target FSM returns to idle after target mode is disabled."
    spec_ref: "rampart_i2c target enable control behavior"
  - name: "p_loopback_path_mapping"
    file: "functional_assertions.sv"
    type: "functional"
    description: "Line loopback mode maps internal inputs from output enables."
    spec_ref: "rampart_i2c spec section 4.1 line_loopback"
  - name: "p_timeout_event_sets_interrupt"
    file: "functional_assertions.sv"
    type: "functional"
    description: "Host timeout event sets interrupt bit 14."
    spec_ref: "rampart_i2c spec section 4.13 host_timeout source"
  - name: "p_arb_lost_sets_interrupt"
    file: "functional_assertions.sv"
    type: "functional"
    description: "Arbitration lost event sets interrupt bit 15."
    spec_ref: "rampart_i2c interrupt source host_arb_lost"

  - name: "p_alert_stays_low"
    file: "structural_assertions.sv"
    type: "structural"
    description: "Alert output remains deasserted in reference RTL."
    spec_ref: "rampart_i2c spec alert behavior"
  - name: "p_host_state_range"
    file: "structural_assertions.sv"
    type: "structural"
    description: "Host FSM encoded state stays within legal range."
    spec_ref: "rampart_i2c host FSM state encoding"
  - name: "p_target_state_range"
    file: "structural_assertions.sv"
    type: "structural"
    description: "Target FSM encoded state stays within legal range."
    spec_ref: "rampart_i2c target FSM state encoding"
  - name: "p_fifo_empty_full_exclusive"
    file: "structural_assertions.sv"
    type: "structural"
    description: "No FIFO can assert empty and full simultaneously."
    spec_ref: "rampart_i2c FIFO invariants"
  - name: "p_fifo_level_bounds"
    file: "structural_assertions.sv"
    type: "structural"
    description: "All FIFO level counters remain within depth limit."
    spec_ref: "rampart_i2c FIFO depth is 64 entries"
  - name: "p_fifo_empty_level_zero"
    file: "structural_assertions.sv"
    type: "structural"
    description: "FIFO empty flags align with zero level counters."
    spec_ref: "rampart_i2c FIFO status semantics"
  - name: "p_d_opcode_when_valid"
    file: "structural_assertions.sv"
    type: "structural"
    description: "Valid D-channel responses use legal opcodes only."
    spec_ref: "TL-UL D-channel response encoding"

  - name: "p_host_progress_from_idle"
    file: "liveness_assertions.sv"
    type: "liveness"
    description: "Host FSM makes progress from idle when commands are queued."
    spec_ref: "rampart_i2c host command processing"
  - name: "p_trans_complete_returns_idle"
    file: "liveness_assertions.sv"
    type: "liveness"
    description: "Host FSM returns to idle after transaction completion event."
    spec_ref: "rampart_i2c transaction completion behavior"
  - name: "p_target_progress_from_start"
    file: "liveness_assertions.sv"
    type: "liveness"
    description: "Target FSM reacts to start condition when enabled."
    spec_ref: "rampart_i2c target mode start detection"
  - name: "p_target_stop_returns_idle"
    file: "liveness_assertions.sv"
    type: "liveness"
    description: "Target FSM returns to idle after stop condition."
    spec_ref: "rampart_i2c target mode stop handling"
  - name: "p_request_response_progress"
    file: "liveness_assertions.sv"
    type: "liveness"
    description: "Accepted TL requests eventually produce a response."
    spec_ref: "TL-UL bounded response progress"
