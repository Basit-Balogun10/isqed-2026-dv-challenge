assertions:
- name: a001_request_acceptance_gate
  type: safety
  property: Valid requests shall be accepted only when processing is enabled; when
    processing is disabled, valid requests shall not enter the processing queue.
  importance: high
  feature_ref: F001
- name: a002_request_response_progress
  type: liveness
  property: Every accepted request shall eventually produce exactly one response.
  importance: critical
  feature_ref: F001
- name: a003_response_order_preserved
  type: safety
  property: Responses shall be returned in the same order as the corresponding requests
    were accepted.
  importance: high
  feature_ref: F001
- name: a004_control_enable_mode_decode
  type: safety
  property: Control-register writes shall correctly update the processing enable state
    and shall select only normal, diagnostic, or low-power mode encodings.
  importance: high
  feature_ref: F002
- name: a005_illegal_mode_sets_error_status
  type: safety
  property: Illegal mode encodings shall assert the error status and shall not be
    treated as legal operating modes.
  importance: critical
  feature_ref: F002
- name: a006_queue_capacity_and_overflow
  type: safety
  property: The queue shall not exceed its finite capacity; when full, new requests
    shall be rejected and overflow status shall be set.
  importance: critical
  feature_ref: F003
- name: a007_empty_queue_indicates_idle
  type: safety
  property: When the queue is empty, the controller shall indicate idle state.
  importance: high
  feature_ref: F003
- name: a008_completion_interrupt_gating
  type: safety
  property: Completion interrupt shall assert only when a request completes and interrupt
    enable is set; otherwise it shall remain deasserted.
  importance: critical
  feature_ref: F004
- name: a009_error_interrupt_gating
  type: safety
  property: Error interrupt shall assert only when at least one enabled error status
    bit is set; otherwise it shall remain deasserted.
  importance: critical
  feature_ref: F004
- name: a010_clear_bits_deassert_interrupt_sources
  type: safety
  property: Writing interrupt clear bits shall deassert the corresponding interrupt
    sources.
  importance: high
  feature_ref: F004
- name: a011_protocol_and_overflow_errors_set_status
  type: safety
  property: Protocol format violations shall set protocol_error status, and queue
    overflow shall set overflow_error status.
  importance: critical
  feature_ref: F005
- name: a012_error_paths_preserve_accepted_requests
  type: safety
  property: Error conditions shall not silently corrupt requests that were already
    accepted before the error occurred.
  importance: critical
  feature_ref: F005
- name: a013_reset_restores_defaults_and_safe_idle
  type: safety
  property: On reset, documented control and status defaults shall be restored, the
    queue shall return to empty, and outputs shall return to safe idle state.
  importance: critical
  feature_ref: F006
assertion_catalog:
  dut_name: generic_peripheral_controller
  count: 13
