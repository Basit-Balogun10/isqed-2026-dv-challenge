default_dut: sentinel_hmac
sim: verilator
seed: 2026
iterations: 12
budget_cycles: 100000
cycles_per_iteration: 8333

# Reward weighting for adaptive updates.
reward_line: 0.35
reward_branch: 0.45
reward_functional: 0.20

# Policy bounds.
learning_rate: 0.12
prob_floor: 0.03
prob_ceiling: 0.92

# Initial focus queue (Approach C target priority).
focus_targets:
    - hmac.func.intr_write_kind:1/2
    - hmac.func.msg_len_bucket:1/2
    - hmac.func.msg_len_nonzero:0/1
    - global:coverage_efficiency
