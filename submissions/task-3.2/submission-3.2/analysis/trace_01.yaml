      note: "LOW half of mtimecmp0 is written first during split update"
root_cause_description: |
    The compare path is continuously active (`timer0_expired = (mtime_q >= mtimecmp0_q)`),
    so writing only MTIMECMP0_LOW creates a transient mixed 64-bit compare value using the
    new LOW half and stale HIGH half. When mtime already exceeds that transient value,
    interrupt state is set before MTIMECMP0_HIGH is written, producing a spurious timer
    interrupt during split writes.
