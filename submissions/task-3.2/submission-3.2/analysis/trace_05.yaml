root_cause_description: |
    In HOST_RSTART_SETUP, SDA/SCL release ordering allows an SDA rising event while SCL is high,
    which is decoded by bus monitors as STOP (`stop_det`). The repeated START transition then
    occurs one cycle later (`start_det`), meaning the sequence contains an unintended STOP-like
    pulse. The bug is timing/order control in repeated-start setup, not the final START itself.
