root_cause_description: |
  CBC encryption requires automatic IV update: after block N, IV must become C[N].
  In the buggy flow, block1 uses the original IV again, so the XOR pre-round state is wrong
  before round processing even begins. That stale IV propagates through all AES rounds and
  produces incorrect block1 ciphertext, triggering the CBC chain assertion.
