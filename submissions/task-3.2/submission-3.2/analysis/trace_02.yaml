root_cause_description: |
    During overflow traffic, `tx_fifo_push` remains asserted even when `tx_fifo_full` is set.
    In the buggy behavior, the memory write path is not fully gated by `!tx_fifo_full`, so
    `tx_fifo_mem[0]` is overwritten by overflow data while `tx_wptr` stays at 0x20. That
    creates a silent data-corruption bug: pointer bookkeeping looks correct, but payload
    integrity is broken at the FIFO head.
