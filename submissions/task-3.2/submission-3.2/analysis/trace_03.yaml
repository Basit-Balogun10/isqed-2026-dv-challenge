  - cycle: 300
    signal: "assert_csn_hold_time"
    value: "FAIL"
    note: "CSn hold interval is shorter than configured csn_trail"
  - cycle: 300
    signal: "timing_done / timing_cnt / reg_csn_trail"
    value: "1 / 3 / 4"
