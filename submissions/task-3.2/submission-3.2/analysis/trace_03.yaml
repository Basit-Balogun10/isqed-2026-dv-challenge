root_cause_description: |
  The CS hold completion logic is off by one in the buggy variant. `timing_done` can assert
  before the full `reg_csn_trail` number of SCLK periods has elapsed, so FSM_CS_HOLD exits
  early and CSn is released one clock period too soon. The fault is in the timing counter/
  completion relationship for the CS hold phase.
